# GPU and AI/ML metrics scraping configuration for OpenTelemetry Collector
# GKE-managed DCGM variant (Google Kubernetes Engine)
#
# DCGM exporter: GKE-managed in gke-managed-system namespace
#   - Pod label: app.kubernetes.io/name=gke-managed-dcgm-exporter
#   - GKE automatically deploys DCGM exporter on GPU node pools
#   - No NVIDIA GPU Operator installation needed
#
# For self-managed NVIDIA GPU Operator (EKS, AKS, bare-metal),
# use last9-otel-collector-gpu-values.yaml instead.
#
# Usage:
#   helm upgrade --install last9-opentelemetry-collector open-telemetry/opentelemetry-collector \
#     --namespace last9 \
#     --version 0.125.0 \
#     --values last9-otel-collector-values.yaml \
#     --values last9-otel-collector-gpu-gke-values.yaml
#
# Prerequisites:
#   - GKE cluster with GPU node pools (DCGM is auto-managed by GKE)
#   - KubeRay Operator installed (for Ray metrics)
#   - GPU node tolerations if nodes are tainted (see examples/tolerations-gpu-nodes.yaml)

# Enable ClusterRole for Kubernetes service discovery
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources:
        - nodes
        - nodes/metrics
        - services
        - endpoints
        - pods
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources:
        - configmaps
      verbs: ["get"]
    - nonResourceURLs:
        - /metrics
      verbs: ["get"]

config:
  exporters:
    prometheusremotewrite/last9:
      endpoint: "{{LAST9_METRICS_ENDPOINT}}"
      auth:
        authenticator: basicauth/last9_metrics
      # Optional: Add external labels to all metrics sent to Last9
      # external_labels:
      #   cluster: "my-cluster"
      #   deployment_environment: "production"
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s

  extensions:
    basicauth/last9_metrics:
      client_auth:
        username: "{{LAST9_METRICS_USERNAME}}"
        password: "{{LAST9_METRICS_PASSWORD}}"

  processors:
    batch:
      send_batch_size: 15000
      send_batch_max_size: 15000
      timeout: 10s

  receivers:
    prometheus:
      config:
        scrape_configs:
          # Collector's own metrics
          - job_name: 'opentelemetry-collector'
            scrape_interval: 30s
            static_configs:
              - targets: ['${env:MY_POD_IP}:8888']

          # Application metrics via pod annotations
          - job_name: 'kubernetes-pods'
            scrape_interval: 30s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+);(\d+)
                replacement: $1:$2
                target_label: __address__
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_node_name]
                action: replace
                target_label: node
              - source_labels: [__meta_kubernetes_pod_label_app]
                action: replace
                target_label: app

          # Application metrics via service annotations
          - job_name: 'kubernetes-services'
            scrape_interval: 30s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: service
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                action: keep
                regex: true
              - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_namespace, __meta_kubernetes_service_annotation_prometheus_io_port]
                action: replace
                regex: ([^;]+);([^;]+);(\d+)
                replacement: $1.$2.svc.cluster.local:$3
                target_label: __address__
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__meta_kubernetes_service_name]
                action: replace
                target_label: service
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace

          # DCGM GPU metrics — GKE-managed DCGM exporter
          # GKE automatically runs DCGM exporter in the gke-managed-system namespace
          # on nodes with GPU accelerators attached
          - job_name: 'dcgm-gpu-metrics'
            scrape_interval: 15s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - gke-managed-system
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                action: keep
                regex: gke-managed-dcgm-exporter
              - source_labels: [__meta_kubernetes_pod_ip]
                action: replace
                regex: (.+)
                replacement: $1:9400
                target_label: __address__
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_node_name]
                action: replace
                target_label: node
            metric_relabel_configs:
              - source_labels: [__name__]
                action: keep
                regex: >-
                  DCGM_FI_DEV_GPU_UTIL|DCGM_FI_DEV_MEM_COPY_UTIL|DCGM_FI_DEV_ENC_UTIL|DCGM_FI_DEV_DEC_UTIL|DCGM_FI_DEV_FB_FREE|DCGM_FI_DEV_FB_USED|DCGM_FI_DEV_FB_TOTAL|DCGM_FI_DEV_GPU_TEMP|DCGM_FI_DEV_MEMORY_TEMP|DCGM_FI_DEV_POWER_USAGE|DCGM_FI_DEV_XID_ERRORS|DCGM_FI_DEV_ECC_SBE_VOL_TOTAL|DCGM_FI_DEV_ECC_DBE_VOL_TOTAL|DCGM_FI_DEV_PCIE_TX_THROUGHPUT|DCGM_FI_DEV_PCIE_RX_THROUGHPUT|DCGM_FI_DEV_SM_CLOCK|DCGM_FI_DEV_MEM_CLOCK|DCGM_FI_DEV_PSTATE

          # Ray head node metrics (KubeRay operator)
          - job_name: 'ray-head'
            scrape_interval: 30s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_ray_io_node_type]
                action: keep
                regex: head
              - source_labels: [__meta_kubernetes_pod_ip]
                action: replace
                regex: (.+)
                replacement: $1:8080
                target_label: __address__
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_node_name]
                action: replace
                target_label: node
              - source_labels: [__meta_kubernetes_pod_label_ray_io_cluster]
                action: replace
                target_label: ray_cluster

          # Ray worker node metrics (KubeRay operator)
          - job_name: 'ray-workers'
            scrape_interval: 30s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_ray_io_node_type]
                action: keep
                regex: worker
              - source_labels: [__meta_kubernetes_pod_ip]
                action: replace
                regex: (.+)
                replacement: $1:8080
                target_label: __address__
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_node_name]
                action: replace
                target_label: node
              - source_labels: [__meta_kubernetes_pod_label_ray_io_cluster]
                action: replace
                target_label: ray_cluster

  service:
    extensions:
      - health_check
      - basicauth/last9_metrics
    pipelines:
      metrics:
        receivers:
          - otlp
          - prometheus
        processors:
          - k8sattributes
          - batch
        exporters:
          - prometheusremotewrite/last9

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi
