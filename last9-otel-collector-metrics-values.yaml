# Optional metrics scraping configuration for OpenTelemetry Collector
# This file adds automatic metrics scraping capabilities via Prometheus receiver
# Use this file with: helm upgrade ... --values last9-otel-collector-values.yaml --values last9-otel-collector-metrics-values.yaml

# Enable ClusterRole for Kubernetes service discovery
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources:
        - nodes
        - nodes/metrics
        - services
        - endpoints
        - pods
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources:
        - configmaps
      verbs: ["get"]
    - nonResourceURLs:
        - /metrics
      verbs: ["get"]

# Base collector configuration for metrics scraping
config:
  exporters:
    # Prometheus Remote Write exporter for Last9 metrics endpoint
    prometheusremotewrite/last9:
      endpoint: "{{LAST9_METRICS_ENDPOINT}}"
      # Use basic auth for Prometheus remote write endpoint
      auth:
        authenticator: basicauth/last9_metrics
      # Optional: Add external labels to all metrics sent to Last9
      # Uncomment and customize the labels below as needed
      # external_labels:
      #   cluster: "minikube"
      #   deployment_environment: "local"
      # Optional: Resource to telemetry conversion (converts K8s resource attributes to metric labels)
      # Uncomment if you want K8s resource attributes (from k8sattributes processor) as metric labels
      # resource_to_telemetry_conversion:
      #   enabled: true
      # Retry configuration
      retry_on_failure:
        enabled: true
        initial_interval: 5s
        max_interval: 30s
        max_elapsed_time: 300s

  extensions:
    # Basic auth extension for Prometheus remote write
    basicauth/last9_metrics:
      client_auth:
        username: "{{LAST9_METRICS_USERNAME}}"
        password: "{{LAST9_METRICS_PASSWORD}}"

  receivers:
    # Prometheus receiver with Kubernetes service discovery
    prometheus:
      config:
        scrape_configs:
          # Collector's own metrics
          - job_name: 'opentelemetry-collector'
            scrape_interval: 30s
            static_configs:
              - targets: ['${env:MY_POD_IP}:8888']

          # Application metrics via pod annotations (standard Prometheus annotations)
          - job_name: 'kubernetes-pods'
            scrape_interval: 30s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              # Only scrape pods with prometheus.io/scrape=true annotation
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: true

              # Read custom scrape port from annotation
              - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+);(\d+)
                replacement: $1:$2
                target_label: __address__

              # Read custom metrics path from annotation (default /metrics)
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)

              # Add Kubernetes metadata as labels
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod

              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace

              - source_labels: [__meta_kubernetes_pod_node_name]
                action: replace
                target_label: node

              - source_labels: [__meta_kubernetes_pod_label_app]
                action: replace
                target_label: app

          # Application metrics via service annotations (standard Prometheus annotations)
          - job_name: 'kubernetes-services'
            scrape_interval: 30s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: service
            relabel_configs:
              # Only scrape services with prometheus.io/scrape=true annotation
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
                action: keep
                regex: true

              # Read custom scrape port from annotation
              - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_namespace, __meta_kubernetes_service_annotation_prometheus_io_port]
                action: replace
                regex: ([^;]+);([^;]+);(\d+)
                replacement: $1.$2.svc.cluster.local:$3
                target_label: __address__

              # Read custom metrics path from annotation
              - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)

              # Add service metadata as labels
              - source_labels: [__meta_kubernetes_service_name]
                action: replace
                target_label: service

              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace

          # DCGM GPU metrics from NVIDIA GPU Operator
          # Discovers pods with app.kubernetes.io/name=nvidia-dcgm-exporter label
          - job_name: 'dcgm-gpu-metrics'
            scrape_interval: 15s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              # Only scrape DCGM exporter pods
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                action: keep
                regex: nvidia-dcgm-exporter

              # Target the DCGM metrics port (9400)
              - source_labels: [__meta_kubernetes_pod_ip]
                action: replace
                regex: (.+)
                replacement: $1:9400
                target_label: __address__

              # Add Kubernetes metadata as labels
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod

              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace

              - source_labels: [__meta_kubernetes_pod_node_name]
                action: replace
                target_label: node

            # Keep only essential DCGM metrics to control cardinality
            metric_relabel_configs:
              - source_labels: [__name__]
                action: keep
                regex: >-
                  DCGM_FI_DEV_GPU_UTIL|DCGM_FI_DEV_MEM_COPY_UTIL|DCGM_FI_DEV_ENC_UTIL|DCGM_FI_DEV_DEC_UTIL|DCGM_FI_DEV_FB_FREE|DCGM_FI_DEV_FB_USED|DCGM_FI_DEV_FB_TOTAL|DCGM_FI_DEV_GPU_TEMP|DCGM_FI_DEV_MEMORY_TEMP|DCGM_FI_DEV_POWER_USAGE|DCGM_FI_DEV_XID_ERRORS|DCGM_FI_DEV_ECC_SBE_VOL_TOTAL|DCGM_FI_DEV_ECC_DBE_VOL_TOTAL|DCGM_FI_DEV_PCIE_TX_THROUGHPUT|DCGM_FI_DEV_PCIE_RX_THROUGHPUT|DCGM_FI_DEV_SM_CLOCK|DCGM_FI_DEV_MEM_CLOCK|DCGM_FI_DEV_PSTATE

          # Ray head node metrics (KubeRay operator)
          # Discovers Ray head pods by ray.io/node-type=head label
          - job_name: 'ray-head'
            scrape_interval: 30s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              # Only scrape Ray head pods
              - source_labels: [__meta_kubernetes_pod_label_ray_io_node_type]
                action: keep
                regex: head

              # Target the Ray metrics port (8080)
              - source_labels: [__meta_kubernetes_pod_ip]
                action: replace
                regex: (.+)
                replacement: $1:8080
                target_label: __address__

              # Add Kubernetes metadata as labels
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod

              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace

              - source_labels: [__meta_kubernetes_pod_node_name]
                action: replace
                target_label: node

              # Carry Ray cluster name as a label
              - source_labels: [__meta_kubernetes_pod_label_ray_io_cluster]
                action: replace
                target_label: ray_cluster

          # Ray worker node metrics (KubeRay operator)
          # Discovers Ray worker pods by ray.io/node-type=worker label
          - job_name: 'ray-workers'
            scrape_interval: 30s
            scrape_timeout: 10s
            honor_labels: true
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              # Only scrape Ray worker pods
              - source_labels: [__meta_kubernetes_pod_label_ray_io_node_type]
                action: keep
                regex: worker

              # Target the Ray metrics port (8080)
              - source_labels: [__meta_kubernetes_pod_ip]
                action: replace
                regex: (.+)
                replacement: $1:8080
                target_label: __address__

              # Add Kubernetes metadata as labels
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod

              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace

              - source_labels: [__meta_kubernetes_pod_node_name]
                action: replace
                target_label: node

              # Carry Ray cluster name as a label
              - source_labels: [__meta_kubernetes_pod_label_ray_io_cluster]
                action: replace
                target_label: ray_cluster

  service:
    extensions:
      - health_check
      - basicauth/last9_metrics
    pipelines:
      metrics:
        receivers:
          - otlp
          - prometheus
        processors:
          - k8sattributes
          - batch
        exporters:
          - prometheusremotewrite/last9

# Increase resource limits for metrics scraping workload
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Optional: Enable metrics port for monitoring
# ports:
#   metrics:
#     enabled: true
#     containerPort: 8888
#     servicePort: 8888
#     protocol: TCP
