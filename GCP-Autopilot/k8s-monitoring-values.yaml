# Disable default deployments
alertmanager:
  enabled: false

grafana:
  enabled: false

prometheus:
  enabled: true
  agentMode: true
  prometheusSpec:
    # Enable only necessary scrape configs
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    
    # Configure remote write
    # Global external labels to add to all metrics
    externalLabels:
      cluster: {{CLUSTER_NAME}}

    remoteWrite:
      - url: "{{MONITORING_ENDPOINT}}"
        remoteTimeout: 60s
        queueConfig:
          capacity: 10000
          maxSamplesPerSend: 3000
          batchSendDeadline: 20s
          minShards: 4
          maxShards: 200
          minBackoff: 100ms
          maxBackoff: 10s
        basicAuth:
          username:
            name: last9-remote-write-secret
            key: username
          password:
            name: last9-remote-write-secret
            key: password
        writeRelabelConfigs:
          - sourceLabels: [__name__]
            regex: "up|kube_.*|container_.*|node_.*"  # Keep relevant metrics
            action: keep

# Keep kube-state-metrics
kubeStateMetrics:
  enabled: true

# Disable node-exporter for GKE Autopilot (requires host access not allowed in Autopilot)
nodeExporter:
  enabled: false

# Disable kubelet monitoring for Autopilot (tries to access kube-system)
kubelet:
  enabled: false

# Disable unnecessary components
prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false

# Disable other exporters (they try to access kube-system which is restricted in Autopilot)
kubeApiServer:
  enabled: false

kubeControllerManager:
  enabled: false

kubeDns:
  enabled: false

coreDns:
  enabled: false

kubeEtcd:
  enabled: false

kubeProxy:
  enabled: false

kubeScheduler:
  enabled: false

# Disable default service monitors that try to access kube-system
defaultRules:
  create: true
  rules:
    kubeApiserver: false
    kubeApiserverAvailability: false
    kubeApiserverSlos: false
    kubelet: false
    kubeProxy: false
    kubeScheduler: false
    kubeControllerManager: false
    etcd: false

