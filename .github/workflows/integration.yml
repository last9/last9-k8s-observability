name: integration

on:
  pull_request:
    paths:
      - 'last9-otel-setup.sh'
      - 'tests/**'
      - '*.yaml'
      - '.github/workflows/integration.yml'
  workflow_dispatch:

jobs:
  # Layer 1 — command orchestration with stubs. Fast, no cluster.
  layer1-orchestration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: Run orchestration tests
        run: bash tests/integration/run.sh layer1

  # Layer 1 — pure helper unit tests
  layer1-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update
          sudo apt-get install -y bats
      - name: Run unit tests
        run: bats tests/unit.bats

  # Layer 1 — behavioral test for the transform/topology OTTL processor.
  # Runs the processor (extracted verbatim from the events values file) in a
  # real otelcol-contrib container and asserts pull-mode k8sobjects payloads
  # get topology attributes extracted. Docker, no cluster.
  layer1-topology-transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install test dependencies
        run: pip install pytest pyyaml
      - name: Run topology transform test
        run: pytest tests/test_topology_transform.py -v

  # Layer 2 — real kind cluster, one mode per matrix leg (parallel, isolated).
  # CRD-conflict legs run on Helm v4 so the server-side-apply default codepath
  # (the version where the cert-manager-cainjector caBundle conflict surfaces)
  # is actually exercised; the rest stay on v3 for broad version coverage.
  layer2-kind:
    runs-on: ubuntu-latest
    needs: layer1-orchestration
    strategy:
      fail-fast: false
      matrix:
        include:
          - { mode: operator-only,          helm: v3.14.0 }
          - { mode: logs-only,              helm: v3.14.0 }
          - { mode: monitoring-only,        helm: v3.14.0 }
          - { mode: events-only,            helm: v3.14.0 }
          - { mode: crd-conflict,           helm: v4.1.3 }
          - { mode: operator-crd-conflict,  helm: v4.1.3 }
          - { mode: context,                helm: v3.14.0 }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # repo= clone of the local checkout needs full history

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ matrix.helm }}

      - name: Run kind e2e (${{ matrix.mode }}, helm ${{ matrix.helm }})
        run: bash tests/integration/run.sh layer2 ${{ matrix.mode }}

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A || true
          kubectl get events -n last9 --sort-by=.lastTimestamp || true
          kubectl describe pods -n last9 || true
